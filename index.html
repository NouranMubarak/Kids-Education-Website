<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kida Academy Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="main">
    <section class="welcome">     
        <div class="welcome-content">
            <h1>🌈 Welcome to Kida Academy</h1>
            <p>• Learn <br> • Play<br>  • Grow Together</p>
        </div>

    </section>

    <section class="login">

        <div class="login-box">
            <h2>👋 Welcome Back</h2>
            <p class="title">Sign in to continue learning!</p>
            <form>
                <div class="input">
                    <label>Email Address</label>
                    <input type="email" placeholder="example@mail.com" required>
                </div>
                <div class="input">
                    <label>Password</label>
                    <input type="password"placeholder="Enter your password" required>
                </div>
                <a href="#" class="forgot-link">Forgot Password?</a>
                <button class="login-btn"> Login </button>
                <div class="or">
                    <span>OR</span>
                </div>
                <button type="button" class="google-btn">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Sign in with Google
                </button>
                <p class="signup">New to Kida Academy?<a>Create Account</a>
                </p>
            </form>
        </div>
    </section>
</main>
</body>
</html>
